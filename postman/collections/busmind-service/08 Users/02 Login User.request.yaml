$kind: http-request
url: "{{base_url}}/users/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "{{test_username}}",
      "password": "{{test_password}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 422]); });
      if (pm.response.code === 200) {
        const j = pm.response.json();
        const token = j.data && j.data.access_token;
        if (token) pm.environment.set('access_token', token);
      }
    language: text/javascript
order: 2000
