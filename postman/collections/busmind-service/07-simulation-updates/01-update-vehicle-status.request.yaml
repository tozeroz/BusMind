$kind: http-request
url: "{{base_url}}/simulation/vehicle-status/{{vehicle_id}}"
method: PATCH
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "longitude": 116.4001,
      "latitude": 39.9101,
      "current_station_id": 1,
      "next_station_id": 3,
      "speed_kph": 18.5,
      "onboard_count": 50,
      "capacity": 60,
      "status": "delayed"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 403, 404, 422, 503]); });
      pm.test('Unified response envelope', function () { const j = pm.response.json(); pm.expect(j).to.have.all.keys('code','message','data','trace_id','timestamp'); });
      pm.test('Vehicle update succeeded', function () { const j=pm.response.json(); pm.expect(j.code).to.eql(0); pm.expect(j.data.vehicle_id).to.eql(Number(pm.environment.get('vehicle_id'))); });
    language: text/javascript
order: 1000
