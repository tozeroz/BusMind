$kind: http-request
url: "{{base_url}}/simulation/lta-bus-arrival/refresh"
method: POST
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "bus_stop_code": "{{lta_bus_stop_code}}",
      "service_no": "{{lta_service_no}}",
      "vehicle_id": 101,
      "line_id": 1,
      "station_id": 3,
      "capacity": 60,
      "expires_in_seconds": 60
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 403, 404, 422, 503]); });
      pm.test('Unified response envelope', function () { const j = pm.response.json(); pm.expect(j).to.have.all.keys('code','message','data','trace_id','timestamp'); });
      pm.test('LTA refresh response', function () { const j=pm.response.json(); if (pm.response.code === 200) { pm.expect(j.code).to.eql(0); pm.expect(j.data.source).to.eql('lta_bus_arrival'); } else { pm.expect(j.code).to.be.oneOf([401, 403, 40410, 50320, 50321]); } });
    language: text/javascript
order: 4000
