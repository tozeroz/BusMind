$kind: http-request
url: "{{base_url}}/vehicles"
method: POST
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: "application/json"
body:
  type: json
  content: |-
    {
      "vehicle_id": 999,
      "vehicle_code": "PM-BUS-999",
      "line_id": "{{line_id}}",
      "latitude": 39.9093,
      "longitude": 116.3974,
      "current_station_id": 1,
      "next_station_id": 3,
      "status": "normal",
      "speed_kph": 18,
      "onboard_count": 20,
      "capacity": 60,
      "data_status": "estimated"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 401, 403, 404, 405, 409, 422, 503]); });
      if (pm.response.headers.get('Content-Type') && pm.response.headers.get('Content-Type').includes('application/json')) { const j = pm.response.json(); pm.expect(j).to.have.property('code'); pm.expect(j).to.have.property('message'); }
    language: text/javascript
order: 5000
