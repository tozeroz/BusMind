$kind: http-request
url: "{{base_url}}/simulation/prediction-results"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "prediction_type": "eta",
      "vehicle_id": 101,
      "line_id": 1,
      "target_station_id": 3,
      "predicted_eta_minutes": 2.5,
      "confidence": 0.97,
      "model_version": "eta_model_20260709",
      "source": "data_engineer_model",
      "expires_in_seconds": 300
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 404, 422, 503]); });
      pm.test('Unified response envelope', function () { const j = pm.response.json(); pm.expect(j).to.have.all.keys('code','message','data','trace_id','timestamp'); });
      pm.test('ETA result stored', function () { const j=pm.response.json(); pm.expect(j.code).to.eql(0); pm.expect(j.data.prediction_type).to.eql('eta'); });
    language: text/javascript
order: 2000
