$kind: http-request
url: "{{base_url}}/lines/{{line_id}}"
method: PATCH
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "line_name": "Updated Line {{line_id}}",
      "status": "running"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 403, 404, 422]); });
    language: text/javascript
order: 4000
