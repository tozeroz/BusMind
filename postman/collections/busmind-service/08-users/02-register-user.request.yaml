$kind: http-request
url: "{{base_url}}/users/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "{{test_username}}",
      "password": "{{test_password}}",
      "password_confirm": "{{test_password}}",
      "email": "{{test_email}}",
      "verification_code": "{{verification_code}}",
      "nickname": "Postman Test User"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([201, 400, 409, 422]); });
    language: text/javascript
order: 2000
