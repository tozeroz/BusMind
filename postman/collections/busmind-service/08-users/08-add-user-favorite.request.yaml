$kind: http-request
url: "{{base_url}}/users/me/favorites"
method: POST
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "favorite_type": "line",
      "target_id": {{line_id}},
      "target_name": "Line {{line_id}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([201, 400, 401, 403, 409, 422]); });
      if (pm.response.code === 201) {
        const j = pm.response.json();
        const id = j.data && j.data.favorite_id;
        if (id) pm.environment.set('favorite_id', id);
      }
    language: text/javascript
order: 8000
