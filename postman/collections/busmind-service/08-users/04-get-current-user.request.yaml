$kind: http-request
url: "{{base_url}}/users/me"
method: GET
headers:
  Authorization: "Bearer {{access_token}}"
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 401, 403]); });
    language: text/javascript
order: 4000
