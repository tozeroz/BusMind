$kind: http-request
url: "{{base_url}}/users/register/email-code"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{test_email}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 429, 500, 422]); });
      pm.test('Unified response envelope', function () { const j = pm.response.json(); pm.expect(j).to.have.all.keys('code','message','data','trace_id','timestamp'); });
    language: text/javascript
order: 1000
