$kind: http-request
url: "{{base_url}}/users/me/refresh-arrivals"
method: POST
headers:
  Authorization: "Bearer {{access_token}}"
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([202, 401, 403]); });
      pm.test('Unified response envelope', function () { const j = pm.response.json(); pm.expect(j).to.have.all.keys('code','message','data','trace_id','timestamp'); });
    language: text/javascript
order: 5000
