$kind: http-request
url: "{{base_url}}/users/me/query-history?page=1&limit=20"
method: GET
headers:
  Authorization: "Bearer {{access_token}}"
  Accept: application/json
queryParams:
  page: "1"
  limit: "20"
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 401, 403, 422]); });
    language: text/javascript
order: 10000
