$kind: http-request
url: "{{base_url}}/stations"
method: POST
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: "application/json"
body:
  type: json
  content: |-
    {
      "station_id": 999,
      "station_name": "Postman Test Station",
      "station_code": "PM999",
      "latitude": 39.9093,
      "longitude": 116.3974,
      "address": "Postman Road",
      "status": "active"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 401, 403, 404, 405, 409, 422, 503]); });
      if (pm.response.headers.get('Content-Type') && pm.response.headers.get('Content-Type').includes('application/json')) { const j = pm.response.json(); pm.expect(j).to.have.property('code'); pm.expect(j).to.have.property('message'); }
    language: text/javascript
order: 2000
