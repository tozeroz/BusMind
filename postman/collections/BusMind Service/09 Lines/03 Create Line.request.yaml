$kind: http-request
url: "{{base_url}}/lines"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "line_name": "Postman Test Line",
      "line_code": "{{test_line_code}}",
      "service_no": "{{test_line_code}}",
      "operator": "BusMind",
      "direction": 1,
      "start_station": "Start",
      "end_station": "End",
      "total_stations": 2,
      "distance_km": 5.2,
      "interval_minutes": 10,
      "status": "running"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([201, 400, 409, 422]); });
    language: text/javascript
order: 3000
