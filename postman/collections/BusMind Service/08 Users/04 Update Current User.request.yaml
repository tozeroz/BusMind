$kind: http-request
url: "{{base_url}}/users/me"
method: PATCH
headers:
  Authorization: "Bearer {{access_token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "nickname": "Updated Postman User"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 422]); });
    language: text/javascript
order: 4000
