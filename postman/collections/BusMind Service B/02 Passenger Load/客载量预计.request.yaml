$kind: http-request
url: "{{base_url}}/passenger-load-prediction"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "line_id": 1,
      "station_id": 3,
      "vehicle_id": 101,
      "current_onboard_count": 40,
      "capacity": 60,
      "weather": "rain"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP status is expected', function () { pm.expect(pm.response.code).to.be.oneOf([200, 400, 404, 422, 503]); });
      pm.test('Unified response envelope', function () { const j = pm.response.json(); pm.expect(j).to.have.all.keys('code','message','data','trace_id','timestamp'); });
      pm.test('Business request succeeded', function () { const j = pm.response.json(); pm.expect(j.code).to.eql(0); pm.expect(j.message).to.eql('success'); });
      pm.test('Load result enum and range', function () { const d=pm.response.json().data; pm.expect(['seats_available','standing_available','limited_standing','overcrowded']).to.include(d.predicted_load_level); pm.expect(d.predicted_load_rate).to.be.within(0,2); pm.expect(d.load_score).to.be.within(0,100); });
    language: text/javascript
order: 1000
